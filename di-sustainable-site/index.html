<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&I | Sustainable Design × Social Innovation</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div class="logo-text">D&I</div>
    <div class="logo-sub">Tongji University</div>
  </a>
  <div class="nav-right">
    <div class="lang-toggle" id="lang-toggle">
      <span class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中</span>
      <span class="lang-btn" data-lang="en" onclick="setLang('en')">EN</span>
    </div>
    <div class="nav-links">
      <a href="index.html" data-page="home" class="active" data-t="nav_home">Home</a>
      <a href="projects.html" data-page="projects" data-t="nav_projects">Projects</a>
      <a href="faculty.html" data-page="faculty" data-t="nav_faculty">Faculty</a>
      <a href="courses.html" data-page="courses" data-t="nav_courses">Courses</a>
    </div>
  </div>
</nav>

<!-- Hero: About -->
<div class="hero hero-about">
  <div class="hero-tag">Tongji College of Design & Innovation</div>
  <h1>
    <span data-lang-zh="可持续设计<br><span class='line2'>× 社会创新</span>" data-lang-en="Sustainable Design<br><span class='line2'>× Social Innovation</span>"></span>
  </h1>
  <div class="hero-manifesto">
    <span data-lang-zh="为人生的意义和世界的未来而学习和创造。" data-lang-en="To Learn and Create, for a Meaningful Life and a Better World."></span>
  </div>
</div>

<!-- About Section -->
<div class="section section-about" id="about-section">
  <div class="about-body" id="about-body"></div>
  <div class="about-milestones" id="about-milestones"></div>
</div>

<!-- Project Gallery -->
<div class="section section-gallery" id="gallery-section">
  <div class="section-header">
    <h2><span class="color-dot"></span> <span data-lang-zh="代表性成果" data-lang-en="Representative Works"></span></h2>
    <a href="projects.html" class="expand-link" id="view-all-projects"></a>
  </div>
  <div class="home-gallery-grid" id="home-gallery-grid"></div>
</div>

<!-- Courses -->
<div class="section" id="courses-section">
  <div class="section-header">
    <h2><span class="color-dot"></span> <span data-lang-zh="课程" data-lang-en="Courses"></span></h2>
    <a href="courses.html" class="expand-link" id="view-all-courses"></a>
  </div>
  <div class="home-courses-list" id="home-courses-list"></div>
</div>

<!-- Faculty -->
<div class="section" id="faculty-section">
  <div class="section-header">
    <h2><span class="color-dot"></span> <span data-lang-zh="教师团队" data-lang-en="Faculty"></span></h2>
    <a href="faculty.html" class="expand-link" id="view-all-faculty"></a>
  </div>
  <div class="home-faculty-list" id="home-faculty-list"></div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div class="detail-content" id="detail-content"></div>
</div>

<div class="footer">
  <span class="brand">D&I Tongji</span>
  <span>College of Design & Innovation, Tongji University</span>
  <a href="#">Sustainable Design &times; Social Innovation</a>
</div>

<script src="data.js"></script>
<script src="main.js"></script>
<script>
/* ─── Index: About + Gallery + Courses (full-width rows) + Faculty (small avatars) ─── */

function renderPage(){
  const data = getData();
  renderAbout(data);
  renderGallery(data);
  renderCourses(data);
  renderFaculty(data);
  document.getElementById('view-all-projects').textContent = T('view_all_projects');
  document.getElementById('view-all-courses').textContent = T('view_all_courses');
  document.getElementById('view-all-faculty').textContent = T('view_all_faculty');
}

/* --- About --- */
function renderAbout(data){
  const body = document.getElementById('about-body');
  const ms = document.getElementById('about-milestones');

  const aboutZh = '同济大学设计创意学院自2009年成立以来，始终以"可持续设计创新"为核心使命，积极探索设计在应对全球社会、经济、技术和环境挑战中的前沿角色。学院的设计教育传统可追溯至二十世纪四十年代深受德国包豪斯学派影响的建筑学教育，历经数十年发展成为亚洲最具国际影响力的设计学院之一。\n\n在可持续设计与社会创新领域，学院长期聚焦可持续生活方式研究、城乡互动、社区营造、社会设计和创新教育等方向。学院设立了全球社会创新与可持续设计联盟（DESIS Network）中的重要成员——同济大学社会创新与可持续设计实验室（Tongji DESIS Lab），并与MIT合作成立上海城市科学实验室（MIT Tongji City Science Lab），通过"主动设计"积极介入社会领域的变革。\n\n学院创办了中国大陆地区第一本全英文设计学术期刊《She Ji: The Journal of Design, Economics, and Innovation》，已被ESCI、Scopus检索收录。学院的研究实践项目多次参与米兰设计周、米兰三年展、威尼斯国际建筑双年展、深港城市建筑双城双年展等国际顶级展览。设计学科连续两轮入选"世界一流学科"建设学科，第五轮学科评估获评A+，QS世界大学学科排名（艺术与设计）连续多年领跑亚洲。';
  const aboutEn = 'Since its establishment in 2009, Tongji University College of Design and Innovation (D&I) has consistently centered its mission on "sustainable design innovation," exploring the frontier role of design in addressing global social, economic, technological, and environmental challenges. The college\'s design education heritage traces back to the 1940s, deeply influenced by the German Bauhaus school, and has evolved over decades into one of Asia\'s most internationally influential design institutions.\n\nIn sustainable design and social innovation, D&I has long focused on sustainable lifestyles, urban-rural interaction, community building, social design, and innovation education. The college hosts the Tongji DESIS Lab — a key member of the global DESIS (Design for Social Innovation and Sustainability) Network — and co-founded the MIT Tongji City Science Lab, actively driving social transformation through "proactive design."\n\nD&I founded *She Ji: The Journal of Design, Economics, and Innovation*, mainland China\'s first fully English-language, peer-reviewed design journal, indexed by ESCI and Scopus. The college\'s research projects have been featured in major international exhibitions including Milan Design Week, Milan Triennale, Venice Architecture Biennale, and the Bi-City Biennale of Urbanism/Architecture. Design at Tongji has been selected twice for China\'s "World-Class Discipline" initiative, received A+ in the fifth national discipline evaluation, and has consistently ranked #1 in Asia in QS World University Rankings by Subject (Art & Design).';

  body.innerHTML = `<p class="about-text">${esc(__LANG==='zh' ? aboutZh : aboutEn)}</p>`;

  const milestonesZh = [
    {year:'2007–2010', text:'连续三次入选美国《商业周刊》"全球最佳设计学院及课程"'},
    {year:'2009', text:'同济大学设计创意学院正式成立'},
    {year:'2010', text:'与芬兰阿尔托大学合作成立"同济-阿尔托设计工厂"'},
    {year:'2012', text:'被确定为同济大学试点学院'},
    {year:'2017 & 2021', text:'设计学科连续两轮入选"世界一流学科"建设学科'},
    {year:'2019', text:'获批设立设计学博士后科研流动站'},
    {year:'2022', text:'设计学全国第五轮学科评估获评A+'},
    {year:'2023–2025', text:'QS艺术与设计学科排名连续领跑亚洲（全球前15）'},
  ];
  const milestonesEn = [
    {year:'2007–2010', text:'Listed 3 times by BusinessWeek among "World\'s Best Design Schools"'},
    {year:'2009', text:'College of Design and Innovation officially established'},
    {year:'2010', text:'Co-founded Tongji-Aalto Design Factory with Aalto University, Finland'},
    {year:'2012', text:'Designated as Tongji University Pilot College'},
    {year:'2017 & 2021', text:'Design discipline selected twice for China\'s "World-Class Discipline" initiative'},
    {year:'2019', text:'Approved to establish Design postdoctoral research station'},
    {year:'2022', text:'Design received A+ in China\'s 5th national discipline evaluation'},
    {year:'2023–2025', text:'QS Art & Design ranking consistently #1 in Asia (global top 15)'},
  ];
  const milestones = __LANG==='zh' ? milestonesZh : milestonesEn;

  ms.innerHTML = milestones.map(m=>`
    <div class="milestone-item">
      <span class="milestone-year">${esc(m.year)}</span>
      <span class="milestone-text">${esc(m.text)}</span>
    </div>
  `).join('');
}

/* --- Project Gallery: 3 curated featured projects --- */
function renderGallery(data){
  const grid = document.getElementById('home-gallery-grid');
  const projects = getFeaturedProjects();
  if(!projects.length){
    grid.innerHTML = `<div class="empty-state"><div class="icon">+</div><h3>${T('no_projects')}</h3></div>`;
    return;
  }
  grid.innerHTML = projects.map(p=>{
    const pName = __LANG==='zh' ? p.name_zh : p.name_en;
    const imgs = p.images;
    return `<div class="gallery-project-card featured-card" onclick="openFeaturedProjectDetail('${p.id}')">
      <div class="gpc-images">
        ${imgs.length >= 5 ? `
          <div class="gpc-img-main"><img src="${imgs[0].src}" alt="${esc(pName)}" loading="lazy"></div>
          <div class="gpc-img-thumbs">
            ${imgs.slice(1,3).map(im=>`<div class="gpc-thumb"><img src="${im.src}" alt="" loading="lazy"></div>`).join('')}
            <div class="gpc-more" onclick="event.stopPropagation();openFeaturedProjectDetail('${p.id}')">
              <span>+${imgs.length - 3}</span>
            </div>
          </div>
        ` : `
          <div class="gpc-img-main"><img src="${imgs[0].src}" alt="${esc(pName)}" loading="lazy"></div>
          ${imgs.length > 1 ? `<div class="gpc-img-thumbs">${imgs.slice(1,3).map(im=>`<div class="gpc-thumb"><img src="${im.src}" alt="" loading="lazy"></div>`).join('')}</div>` : ''}
        `}
      </div>
      <div class="gpc-info">
        <h3>${esc(pName)}</h3>
        <span class="gpc-faculty-count">${p.faculty_ids.length} ${__LANG==='zh'?'位教师':'Faculty'}</span>
      </div>
    </div>`;
  }).join('');
}

/* --- Courses: only Zhu Xiaocun's courses on homepage --- */
function renderCourses(data){
  const list = document.getElementById('home-courses-list');
  const zxc = data.find(f=>f.id==='zhu-xiaocun');
  if(!zxc || !(zxc.courses||[]).length){
    list.innerHTML = `<div class="empty-state"><div class="icon">+</div><h3>${T('no_courses')}</h3></div>`;
    return;
  }
  list.innerHTML = zxc.courses.map((c,idx)=>{
    const name = langField(c,'name') || T('untitled');
    const desc = langField(c,'description');
    const facName = zxc.name_zh || zxc.name_en || '';
    return `<div class="home-course-row" onclick="openCourseDetail('${zxc.id}',${idx})">
      <div class="hcr-left">
        <div class="hcr-avatar">${zxc.photo ? `<img src="${zxc.photo}" alt="">` : `<span>${getInitials(facName)}</span>`}</div>
        <div class="hcr-faculty-name">${esc(facName)}</div>
      </div>
      <div class="hcr-center">
        <h3>${esc(name)}</h3>
        <p>${esc(desc)||''}</p>
      </div>
      <div class="hcr-arrow">\u2192</div>
    </div>`;
  }).join('');
}

/* --- Faculty: compact rows with small avatars --- */
function renderFaculty(data){
  const list = document.getElementById('home-faculty-list');
  list.innerHTML = data.map(f=>{
    const name = f.name_zh || f.name_en || T('untitled');
    const title = __LANG==='zh' ? (f.title_zh||f.title_en) : (f.title_en||f.title_zh);
    return `<div class="home-faculty-row" onclick="openDetail('${f.id}')">
      <div class="hfr-avatar">${f.photo ? `<img src="${f.photo}" alt="${esc(name)}">` : `<span>${getInitials(name)}</span>`}</div>
      <div class="hfr-info">
        <div class="hfr-name">${esc(name)}</div>
        <div class="hfr-title">${esc(title)||''}</div>
      </div>
      <div class="hfr-tags">${(f.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

setActiveNav('home');
renderPage();
</script>
</body>
</html>
