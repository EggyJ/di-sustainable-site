<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | D&I Data Management</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-bg:#FFFFFF;--color-text:#505050;--color-text-heading:#3E3E3E;--color-text-sub:#646464;
  --color-text-muted:#969696;--color-text-weak:#B4B4B4;--color-title-deep:#333333;
  --color-link:#505050;--color-link-hover:#C60000;--color-external:#1E64DC;
  --color-border:#BFBFBF;--color-border-sub:#D8D8D8;--color-input-border:#CACACA;
  --color-input-bg:#FBFBFB;--color-bg-subtle:#F8F8F8;--color-bg-muted:#F3F3F3;
  --color-bg-alt:#F0F0F0;--color-bg-hover:#EEEEEE;
  --accent-red:#EB212E;--accent-gold:#C6B071;--accent-yellow:#FFDC00;
  --accent-orange:#F36921;--accent-green:#44DC99;--accent-blue:#1E5AF0;
  --font-sans:'Open Sans',Arial,"Hiragino Sans GB","STHeiti","Microsoft YaHei",SimSun,sans-serif;
  --font-size-base:13px;--line-height-base:165%;--transition:0.15s ease;
}
html{font-size:16px}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);line-height:var(--line-height-base);font-size:var(--font-size-base)}
a{color:var(--color-link);text-decoration:none;transition:var(--transition)}
a:hover{color:var(--color-link-hover)}

/* ---- Nav ---- */
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;border-bottom:1px solid var(--color-border);position:sticky;top:0;background:rgba(255,255,255,0.92);z-index:100;backdrop-filter:blur(8px)}
.nav-left{display:flex;align-items:center;gap:20px}
.nav-title{font-size:14px;font-weight:700;color:var(--color-title-deep);display:flex;align-items:center;gap:8px}
.nav-title .icon{width:8px;height:8px;background:var(--accent-yellow);flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:16px}
.nav a{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-sub)}
.nav a:hover{text-decoration:none;color:var(--color-link-hover)}

/* ---- Toolbar ---- */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;border-bottom:1px solid var(--color-border-sub);background:var(--color-bg-subtle)}
.toolbar-left{display:flex;align-items:center;gap:12px}
.toolbar-right{display:flex;align-items:center;gap:10px}
.search-box{position:relative}
.search-box input{padding:6px 12px 6px 32px;border:1px solid var(--color-border-sub);background:var(--color-bg);font-family:var(--font-sans);font-size:12px;width:220px;transition:var(--transition);color:var(--color-text-heading)}
.search-box input:focus{outline:none;border-color:var(--accent-blue);width:280px}
.search-box .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--color-text-weak);font-size:13px;pointer-events:none}
.stat{font-size:11px;color:var(--color-text-muted);letter-spacing:0.5px}

/* ---- Language Toggle ---- */
.lang-tabs{display:flex;gap:2px;background:var(--color-bg-muted);border-radius:4px;padding:2px}
.lang-tab{padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--color-text-muted);border-radius:3px;transition:var(--transition);font-family:var(--font-sans)}
.lang-tab.active{background:#fff;color:var(--color-title-deep);box-shadow:0 1px 2px rgba(0,0,0,0.06)}

/* ---- Buttons ---- */
.btn{padding:6px 14px;font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:var(--transition);border:none;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-primary{background:var(--accent-blue);color:#fff}
.btn-primary:hover{background:#1748cc}
.btn-ghost{background:transparent;color:var(--color-text-sub);border:1px solid var(--color-border-sub)}
.btn-ghost:hover{background:var(--color-bg-alt);border-color:var(--color-border)}
.btn-danger-ghost{background:transparent;color:var(--accent-red);border:1px solid transparent;padding:4px 6px}
.btn-danger-ghost:hover{background:rgba(235,33,46,0.06)}
.btn-add{background:var(--accent-yellow);color:var(--color-title-deep);font-weight:700}
.btn-add:hover{background:#e6c800}
.btn-export{background:transparent;color:var(--color-text-sub);border:1px solid var(--color-border-sub)}
.btn-export:hover{background:var(--color-bg-alt)}

/* ---- Table Container ---- */
.table-container{position:relative}
.table-wrap{overflow-x:auto}

/* ---- Notion-style Table ---- */
.data-table{width:100%;border-collapse:collapse;table-layout:fixed}
.data-table th{
  padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.8px;color:var(--color-text-muted);text-align:left;
  background:var(--color-bg-subtle);border-bottom:2px solid var(--color-border);
  position:sticky;top:0;z-index:2;white-space:nowrap;user-select:none;
}
.data-table th .th-inner{display:flex;align-items:center;gap:6px;cursor:default}
.data-table th .th-resize{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent}
.data-table th .th-resize:hover{background:var(--accent-blue)}
.data-table td{padding:0;border-bottom:1px solid var(--color-border-sub);vertical-align:top;position:relative}
.data-table tr{transition:var(--transition)}
.data-table tbody tr:hover{background:var(--color-bg-hover)}
.data-table tbody tr.active{background:rgba(30,90,240,0.04)}

/* ---- Cell editing ---- */
.cell{padding:8px 14px;min-height:38px;font-size:13px;color:var(--color-text-heading);cursor:text;outline:none;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.cell:focus{background:var(--color-bg);box-shadow:inset 0 0 0 2px var(--accent-blue)}
.cell::before{content:attr(data-placeholder);color:var(--color-text-weak);font-style:italic}
.cell:not(:empty)::before{display:none}
.cell.name-cell{font-weight:700;font-size:14px;color:var(--color-title-deep)}
.cell.title-cell{font-size:12px;color:var(--color-text-sub)}
.cell-lang-tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;margin-left:4px;vertical-align:middle}
.cell-lang-zh{background:var(--accent-red);color:#fff}
.cell-lang-en{background:var(--accent-blue);color:#fff}

/* ---- Tags in table ---- */
.tags-cell{padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;min-height:38px;align-items:flex-start}
.table-tag{font-size:10px;font-weight:600;padding:2px 8px;background:var(--color-bg-muted);color:var(--color-text-sub);letter-spacing:0.3px;white-space:nowrap}
.table-tag.add{background:transparent;border:1px dashed var(--color-border-sub);color:var(--color-text-weak);cursor:pointer;padding:2px 6px}
.table-tag.add:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

/* ---- Mini items in cells ---- */
.items-cell{padding:6px 10px;display:flex;flex-direction:column;gap:4px}
.mini-item{padding:6px 10px;background:var(--color-bg-subtle);border:1px solid var(--color-border-sub);font-size:12px;cursor:pointer;transition:var(--transition);position:relative}
.mini-item:hover{border-color:var(--color-border)}
.mini-item .mi-name{font-weight:600;color:var(--color-text-heading);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-item .mi-desc{color:var(--color-text-muted);font-size:11px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.mini-item .mi-badge{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--accent-red);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--transition);font-weight:700}
.mini-item:hover .mi-badge{opacity:1}
.mini-add{padding:6px 10px;border:1px dashed var(--color-border-sub);color:var(--color-text-weak);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:var(--transition)}
.mini-add:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

/* ---- Gallery in cell ---- */
.gallery-cell{padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;min-height:38px;align-items:flex-start}
.gallery-thumb{width:48px;height:36px;overflow:hidden;background:var(--color-bg-alt);position:relative;cursor:pointer;border:1px solid var(--color-border-sub)}
.gallery-thumb img{width:100%;height:100%;object-fit:cover}
.gallery-thumb .gt-remove{position:absolute;inset:0;background:rgba(235,33,46,0.7);color:#fff;display:none;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.gallery-thumb:hover .gt-remove{display:flex}
.gallery-add{width:48px;height:36px;border:1px dashed var(--color-border-sub);display:flex;align-items:center;justify-content:center;color:var(--color-text-weak);font-size:16px;cursor:pointer;transition:var(--transition)}
.gallery-add:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
.gallery-count{font-size:11px;color:var(--color-text-muted);align-self:center;margin-left:4px}

/* ---- Photo cell ---- */
.photo-cell{padding:6px 10px}
.photo-thumb{width:36px;height:48px;overflow:hidden;background:var(--color-bg-alt);border:1px solid var(--color-border-sub);cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-upload-mini{width:36px;height:48px;border:1px dashed var(--color-border-sub);display:flex;align-items:center;justify-content:center;color:var(--color-text-weak);font-size:14px;cursor:pointer;transition:var(--transition)}
.photo-upload-mini:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

/* ---- Detail Panel ---- */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s ease}
.panel-overlay.active{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:720px;max-width:92vw;background:var(--color-bg);z-index:201;box-shadow:-4px 0 20px rgba(0,0,0,0.08);transform:translateX(100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);overflow-y:auto}
.detail-panel.active{transform:translateX(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--color-border);position:sticky;top:0;background:var(--color-bg);z-index:1}
.panel-header h2{font-size:15px;font-weight:700;color:var(--color-title-deep)}
.panel-header .panel-actions{display:flex;gap:8px}
.panel-close{width:28px;height:28px;border:1px solid var(--color-border-sub);background:var(--color-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--color-text-sub);transition:var(--transition)}
.panel-close:hover{background:var(--color-link-hover);color:#fff;border-color:var(--color-link-hover)}
.panel-body{padding:24px}

/* Panel fields - bilingual */
.p-field{margin-bottom:20px}
.p-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--color-text-muted);margin-bottom:5px}
.p-field label .hint{font-weight:400;text-transform:none;letter-spacing:0;opacity:0.8;color:var(--color-text-sub)}
.p-field label .lang-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;margin-left:4px;vertical-align:middle}
.p-field label .lang-badge-zh{background:var(--accent-red);color:#fff}
.p-field label .lang-badge-en{background:var(--accent-blue);color:#fff}
.p-field input[type="text"],
.p-field textarea{width:100%;padding:7px 10px;border:1px solid var(--color-input-border);font-family:var(--font-sans);font-size:13px;line-height:1.5;transition:var(--transition);background:var(--color-input-bg);color:var(--color-text-heading)}
.p-field input:focus,.p-field textarea:focus{outline:none;border-color:var(--accent-blue)}
.p-field textarea{resize:vertical;min-height:70px}
.p-char-count{text-align:right;font-size:10px;color:var(--color-text-muted);margin-top:3px}
.p-char-count.warn{color:var(--accent-red)}

.p-bilingual{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.p-bilingual .p-half label{display:flex;align-items:center;gap:4px}

.p-group{border:1px solid var(--color-border-sub);padding:12px 14px;margin-bottom:8px;position:relative;background:var(--color-bg-subtle)}
.p-group h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent-blue);margin-bottom:8px}
.p-group .rm{position:absolute;top:6px;right:8px;background:transparent;border:none;color:var(--color-text-muted);cursor:pointer;font-size:15px;transition:var(--transition)}
.p-group .rm:hover{color:var(--accent-red)}
.p-add{padding:5px 10px;border:1px dashed var(--color-border-sub);background:transparent;cursor:pointer;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-muted);font-family:var(--font-sans);transition:var(--transition);margin-top:6px}
.p-add:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

.p-photo{width:80px;height:107px;border:1px dashed var(--color-border-sub);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:var(--transition)}
.p-photo:hover{border-color:var(--accent-blue)}
.p-photo img{width:100%;height:100%;object-fit:cover;position:absolute}
.p-photo input{position:absolute;inset:0;opacity:0;cursor:pointer}
.p-photo .ph-text{font-size:10px;font-weight:600;color:var(--color-text-muted);text-align:center}

.p-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.p-gallery-slot{aspect-ratio:4/3;border:1px solid var(--color-border-sub);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;transition:var(--transition);background:var(--color-bg-alt);border-radius:2px}
.p-gallery-slot:hover{border-color:var(--accent-blue)}
.p-gallery-slot img{width:100%;height:100%;object-fit:cover;position:absolute}
.p-gallery-slot .plus{font-size:18px;color:var(--color-border-sub);pointer-events:none}
.p-gallery-slot input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.p-gallery-slot .g-bottom{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column;z-index:2}
.p-gallery-slot .g-caption-row{display:flex;gap:2px}
.p-gallery-slot .cap{flex:1;padding:2px 4px;background:rgba(0,0,0,0.55);color:#fff;font-size:8px;font-weight:600;border:none;outline:none;font-family:var(--font-sans);line-height:1.4}
.p-gallery-slot .cap::placeholder{color:rgba(255,255,255,0.5)}
.p-gallery-slot .g-rm{position:absolute;top:2px;right:2px;width:18px;height:18px;background:var(--accent-red);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);z-index:3;border-radius:0}
.p-gallery-slot:hover .g-rm{opacity:1}

/* ---- Toast ---- */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--color-title-deep);color:#fff;padding:10px 24px;font-size:12px;font-weight:600;letter-spacing:0.3px;z-index:1000;opacity:0;transition:0.2s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Empty state ---- */
.empty-state{text-align:center;padding:80px 32px;color:var(--color-text-muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.2}
.empty-state h3{font-size:15px;font-weight:700;color:var(--color-title-deep);margin-bottom:8px}
.empty-state p{font-size:13px;max-width:400px;margin:0 auto 16px;line-height:1.7;color:var(--color-text-sub)}

/* ---- Column widths ---- */
.col-photo{width:60px}
.col-name{width:180px}
.col-title{width:140px}
.col-tags{width:180px}
.col-bio{width:240px}
.col-work{width:240px}
.col-courses{width:200px}
.col-gallery{width:140px}
.col-actions{width:50px}

/* ---- Image upload drop zone ---- */
.drop-zone{border:2px dashed var(--color-border-sub);border-radius:6px;padding:24px;text-align:center;cursor:pointer;transition:var(--transition);margin-bottom:12px;color:var(--color-text-muted)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent-blue);background:rgba(30,90,240,0.03)}
.drop-zone p{font-size:12px;margin-top:6px}
.drop-zone .drop-icon{font-size:24px;opacity:0.4}

@media(max-width:900px){
  .toolbar{flex-direction:column;gap:8px;align-items:flex-start}
  .detail-panel{width:100%;max-width:100vw}
  .col-bio,.col-work,.col-courses,.col-gallery{display:none}
  .p-bilingual{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="index.html" style="font-size:13px;color:var(--color-title-deep);font-weight:700;text-transform:none;letter-spacing:-0.3px">&larr; D&I Site</a>
    <div class="nav-title"><span class="icon"></span> Faculty Database</div>
  </div>
  <div class="nav-right">
    <div class="lang-tabs" id="viewLangTabs">
      <button class="lang-tab active" onclick="setViewLang('zh')">中文</button>
      <button class="lang-tab" onclick="setViewLang('en')">EN</button>
    </div>
    <a href="index.html">View Site</a>
  </div>
</nav>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-box">
      <span class="search-icon">&#x2315;</span>
      <input type="text" id="search" placeholder="Search..." oninput="renderTable()">
    </div>
    <span class="stat" id="stat"></span>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-add" onclick="addNew()">+ New</button>
    <button class="btn btn-export" onclick="exportData()">Export data.js</button>
    <button class="btn btn-sm btn-ghost" onclick="reseedFromDataJs()">Discard Edits</button>
  </div>
</div>

<div class="table-container">
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th class="col-photo"><div class="th-inner">Photo</div></th>
          <th class="col-name"><div class="th-inner">Name</div></th>
          <th class="col-title"><div class="th-inner">Title</div></th>
          <th class="col-tags"><div class="th-inner">Tags</div></th>
          <th class="col-bio"><div class="th-inner">Bio</div></th>
          <th class="col-work"><div class="th-inner">Works</div></th>
          <th class="col-courses"><div class="th-inner">Courses</div></th>
          <th class="col-gallery"><div class="th-inner">Gallery</div></th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <h2 id="panel-title">Faculty</h2>
    <div class="panel-actions">
      <button class="btn btn-sm btn-ghost" onclick="saveAndNotify()">Save</button>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
/* ===== Data Layer — direct in-memory, synced with data.js ===== */
// Admin loads data from faculty.json (fetch) or falls back to window.__SITE_DATA__ (script tag).
// All edits happen on this in-memory array. Export writes it back to a data.js file.

let _DATA = [];
let currentId = null;
let viewLang = 'zh';

function getData(){ return _DATA }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7) }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000) }
function readFileAsDataURL(f){ return new Promise((r,j)=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=j; fr.readAsDataURL(f) }) }
function langVal(obj, field, lang){
  if(!obj) return '';
  return obj[field + '_' + lang] || obj[field + '_' + (lang==='zh'?'en':'zh')] || '';
}

async function loadData(){
  // Try multiple loading strategies
  // 1. Already loaded via script tag
  if(window.__SITE_DATA__ && window.__SITE_DATA__.length){
    _DATA = JSON.parse(JSON.stringify(window.__SITE_DATA__));
    return;
  }
  // 2. Fetch faculty.json (works in most preview environments)
  try{
    const resp = await fetch('faculty.json');
    if(resp.ok){
      const data = await resp.json();
      _DATA = data;
      return;
    }
  }catch(e){ /* ignore, try next */ }
  // 3. Fetch data.js and parse
  try{
    const resp = await fetch('data.js');
    if(resp.ok){
      const text = await resp.text();
      const json = text.replace(/^window\.__SITE_DATA__\s*=\s*/, '').replace(/;\s*$/, '');
      _DATA = JSON.parse(json);
      return;
    }
  }catch(e){ /* ignore */ }
  _DATA = [];
}

async function init(){
  await loadData();
  renderTable();
}
init();

/* ===== Language Toggle ===== */
function setViewLang(lang){
  viewLang = lang;
  document.querySelectorAll('#viewLangTabs .lang-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === (lang==='zh'?'中文':'EN'));
  });
  renderTable();
}

/* ===== Table Rendering ===== */
function getFilteredData(){
  const q = document.getElementById('search').value.toLowerCase();
  const data = getData();
  if(!q) return data;
  return data.filter(f => {
    const name = (f.name_zh||'') + (f.name_en||'');
    const title = (f.title_zh||'') + (f.title_en||'');
    const bio = (f.bio_zh||'') + (f.bio_en||'');
    return name.toLowerCase().includes(q) || title.toLowerCase().includes(q) || bio.toLowerCase().includes(q) || (f.tags||[]).some(t=>t.toLowerCase().includes(q));
  });
}

function renderTable(){
  const data = getFilteredData();
  const allData = getData();
  const totalAch = allData.reduce((s,f)=>s+(f.achievements||[]).length,0);
  const totalCourses = allData.reduce((s,f)=>s+(f.courses||[]).length,0);
  const totalGallery = allData.reduce((s,f)=>s+(f.gallery||[]).length,0);
  document.getElementById('stat').textContent = data.length + ' members \u00b7 ' + totalAch + ' works \u00b7 ' + totalCourses + ' courses \u00b7 ' + totalGallery + ' images';
  
  const tbody = document.getElementById('tbody');
  if(!data.length){
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">+</div><h3>No faculty yet</h3><p>Click "+ New" to add a faculty member, or "Reset from data.js" to load existing data.</p></div></td></tr>';
    return;
  }
  
  const lang = viewLang;
  const langBadge = '<span class="cell-lang-tag '+(lang==='zh'?'cell-lang-zh':'cell-lang-en')+'">'+lang.toUpperCase()+'</span>';
  
  tbody.innerHTML = data.map(f => {
    const name = langVal(f,'name',lang);
    const title = langVal(f,'title',lang);
    const bio = langVal(f,'bio',lang);
    
    return `<tr class="${f.id===currentId?'active':''}" ondblclick="openPanel('${f.id}')">
      <td class="photo-cell" ondblclick="event.stopPropagation()">
        ${f.photo
          ? '<div class="photo-thumb"><img src="'+esc(f.photo)+'"></div>'
          : '<div class="photo-upload-mini" onclick="event.stopPropagation();triggerPhotoUpload(\''+f.id+'\')">+</div><input type="file" id="photo-input-'+f.id+'" accept="image/*" style="display:none" onchange="handlePhotoInline(\''+f.id+'\',this)">'
        }
      </td>
      <td><div class="cell name-cell">${esc(name)}${langBadge}</div></td>
      <td><div class="cell title-cell">${esc(title)}</div></td>
      <td>
        <div class="tags-cell" data-id="${f.id}">
          ${(f.tags||[]).map(t=>'<span class="table-tag">'+esc(t)+'</span>').join('')}
          <span class="table-tag add" ondblclick="event.stopPropagation();openPanel(\''+f.id+'\')">+ tag</span>
        </div>
      </td>
      <td><div class="cell" style="max-height:80px;overflow:hidden">${esc(bio).substring(0,200)}${bio.length>200?'...':''}</div></td>
      <td>
        <div class="items-cell">
          ${(f.achievements||[]).slice(0,3).map((a,i) => {
            const aName = langVal(a,'name',lang);
            const aDesc = langVal(a,'description',lang);
            return '<div class="mini-item" ondblclick="event.stopPropagation();openPanel(\''+f.id+'\')"><div class="mi-name">'+esc(aName)+'</div><div class="mi-desc">'+esc(aDesc).substring(0,80)+'</div><div class="mi-badge" onclick="event.stopPropagation();removeAchievementInline(\''+f.id+'\','+i+');renderTable()">&times;</div></div>';
          }).join('')}
          ${(f.achievements||[]).length>3?'<div class="mini-add">+'+(f.achievements.length-3)+' more</div>':''}
          <div class="mini-add" ondblclick="event.stopPropagation();addAchievementInline(\''+f.id+'\')">+ Add Work</div>
        </div>
      </td>
      <td>
        <div class="items-cell">
          ${(f.courses||[]).slice(0,3).map((c,i) => {
            const cName = langVal(c,'name',lang);
            return '<div class="mini-item" ondblclick="event.stopPropagation();openPanel(\''+f.id+'\')"><div class="mi-name">'+esc(cName)+'</div><div class="mi-badge" onclick="event.stopPropagation();removeCourseInline(\''+f.id+'\','+i+');renderTable()">&times;</div></div>';
          }).join('')}
          ${(f.courses||[]).length>3?'<div class="mini-add">+'+(f.courses.length-3)+' more</div>':''}
          <div class="mini-add" ondblclick="event.stopPropagation();addCourseInline(\''+f.id+'\')">+ Add Course</div>
        </div>
      </td>
      <td>
        <div class="gallery-cell">
          ${(f.gallery||[]).slice(0,4).map((g,i) =>
            '<div class="gallery-thumb"><img src="'+esc(g.src)+'"><div class="gt-remove" onclick="event.stopPropagation();removeGalleryInline(\''+f.id+'\','+i+');renderTable()">&times;</div></div>'
          ).join('')}
          ${!(f.gallery||[]).length?'<div class="gallery-add" onclick="event.stopPropagation();openPanel(\''+f.id+'\')">+</div>':''}
          ${(f.gallery||[]).length>4?'<span class="gallery-count">+'+(f.gallery.length-4)+'</span>':''}
        </div>
      </td>
      <td>
        <button class="btn btn-sm btn-danger-ghost" onclick="deleteFaculty('${f.id}')" title="Delete">&#x2715;</button>
      </td>
    </tr>';
  }).join('');
}

/* ===== Inline Actions ===== */
function triggerPhotoUpload(id){ document.getElementById('photo-input-'+id).click() }
async function handlePhotoInline(id, input){
  const file = input.files[0]; if(!file) return;
  const url = await readFileAsDataURL(file);
  const f = _DATA.find(x=>x.id===id);
  if(f){ f.photo = url; renderTable(); showToast('Photo updated') }
}

function addAchievementInline(id){
  const f=_DATA.find(x=>x.id===id);
  if(f){ if(!f.achievements) f.achievements=[]; f.achievements.push({name_zh:'',name_en:'',description_zh:'',description_en:''}); renderTable(); openPanel(id) }
}
function removeAchievementInline(id,i){ const f=_DATA.find(x=>x.id===id); if(f&&f.achievements){ f.achievements.splice(i,1); renderTable() } }
function addCourseInline(id){
  const f=_DATA.find(x=>x.id===id);
  if(f){ if(!f.courses) f.courses=[]; f.courses.push({name_zh:'',name_en:'',description_zh:'',description_en:''}); renderTable(); openPanel(id) }
}
function removeCourseInline(id,i){ const f=_DATA.find(x=>x.id===id); if(f&&f.courses){ f.courses.splice(i,1); renderTable() } }
function removeGalleryInline(id,i){ const f=_DATA.find(x=>x.id===id); if(f&&f.gallery){ f.gallery.splice(i,1); renderTable() } }

function addNew(){
  const id=uid();
  _DATA.push({ id, photo:'', name_zh:'', name_en:'', title_zh:'', title_en:'', bio_zh:'', bio_en:'', tags:[], achievements:[], courses:[], gallery:[] });
  renderTable(); openPanel(id);
}
function deleteFaculty(id){
  if(!confirm('Delete this faculty member?')) return;
  _DATA = _DATA.filter(f=>f.id!==id);
  if(currentId===id) currentId=null; renderTable(); showToast('Deleted');
}

/* ===== Detail Panel (Bilingual) ===== */
function openPanel(id){
  currentId = id; renderTable();
  const data = getData(); const f = data.find(x=>x.id===id); if(!f) return;
  const title = f.name_zh || f.name_en || 'New Faculty';
  document.getElementById('panel-title').textContent = title;
  
  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <!-- Photo Upload -->
    <div class="p-field">
      <label>Faculty Photo</label>
      <div class="p-photo" id="p-photo-wrap">
        ${f.photo?'<img src="'+esc(f.photo)+'">':'<span class="ph-text">Upload<br>Photo</span>'}
        <input type="file" accept="image/*" onchange="handlePanelPhoto(this)">
      </div>
    </div>
    
    <!-- Name (Bilingual) -->
    <div class="p-bilingual">
      <div class="p-half">
        <label>Name <span class="lang-badge lang-badge-zh">ZH</span></label>
        <input type="text" value="${esc(f.name_zh)}" oninput="updateField('name_zh',this.value)" placeholder="中文名">
      </div>
      <div class="p-half">
        <label>Name <span class="lang-badge lang-badge-en">EN</span></label>
        <input type="text" value="${esc(f.name_en)}" oninput="updateField('name_en',this.value)" placeholder="English Name">
      </div>
    </div>
    
    <!-- Title (Bilingual) -->
    <div class="p-bilingual">
      <div class="p-half">
        <label>Title <span class="lang-badge lang-badge-zh">ZH</span></label>
        <input type="text" value="${esc(f.title_zh)}" oninput="updateField('title_zh',this.value)" placeholder="中文职称">
      </div>
      <div class="p-half">
        <label>Title <span class="lang-badge lang-badge-en">EN</span></label>
        <input type="text" value="${esc(f.title_en)}" oninput="updateField('title_en',this.value)" placeholder="English Title">
      </div>
    </div>
    
    <!-- Tags -->
    <div class="p-field">
      <label>Tags <span class="hint">comma separated (English)</span></label>
      <input type="text" value="${esc((f.tags||[]).join(', '))}" oninput="updateField('tags',this.value.split(',').map(s=>s.trim()).filter(Boolean))">
    </div>
    
    <!-- Bio (Bilingual) -->
    <div class="p-field">
      <label>Bio <span class="lang-badge lang-badge-zh">ZH</span> <span class="hint">~300 chars</span></label>
      <textarea oninput="updateField('bio_zh',this.value);updateCount('p-bio-zh-c',this.value,300)">${esc(f.bio_zh)}</textarea>
      <div class="p-char-count" id="p-bio-zh-c">${(f.bio_zh||'').length}/300</div>
    </div>
    <div class="p-field">
      <label>Bio <span class="lang-badge lang-badge-en">EN</span> <span class="hint">~300 chars</span></label>
      <textarea oninput="updateField('bio_en',this.value);updateCount('p-bio-en-c',this.value,300)">${esc(f.bio_en)}</textarea>
      <div class="p-char-count" id="p-bio-en-c">${(f.bio_en||'').length}/300</div>
    </div>
    
    <!-- Achievements (Bilingual) -->
    <div class="p-field">
      <label>Selected Works</label>
      <div id="p-achievements">
        ${(f.achievements||[]).map((a,i) => `
          <div class="p-group">
            <button class="rm" onclick="removePanelAchievement(${i})">&times;</button>
            <h4>Work #${i+1}</h4>
            <div class="p-bilingual" style="margin-bottom:8px">
              <div class="p-half">
                <label style="font-size:9px">Name <span class="lang-badge lang-badge-zh">ZH</span></label>
                <input type="text" value="${esc(a.name_zh)}" oninput="updatePanelAchievement(${i},'name_zh',this.value)" placeholder="项目/论文名">
              </div>
              <div class="p-half">
                <label style="font-size:9px">Name <span class="lang-badge lang-badge-en">EN</span></label>
                <input type="text" value="${esc(a.name_en)}" oninput="updatePanelAchievement(${i},'name_en',this.value)" placeholder="Project/Paper Name">
              </div>
            </div>
            <div class="p-bilingual">
              <div class="p-half">
                <label style="font-size:9px">Description <span class="lang-badge lang-badge-zh">ZH</span></label>
                <textarea style="min-height:50px" oninput="updatePanelAchievement(${i},'description_zh',this.value)" placeholder="描述">${esc(a.description_zh)}</textarea>
              </div>
              <div class="p-half">
                <label style="font-size:9px">Description <span class="lang-badge lang-badge-en">EN</span></label>
                <textarea style="min-height:50px" oninput="updatePanelAchievement(${i},'description_en',this.value)" placeholder="Description">${esc(a.description_en)}</textarea>

          </div>`).join('')}
      </div>
      <button class="p-add" onclick="addPanelAchievement()">+ Add Work</button>

    <!-- Courses (Bilingual) -->
    <div class="p-field">
      <label>Courses</label>
      <div id="p-courses">
        ${(f.courses||[]).map((c,i) => `
          <div class="p-group">
            <button class="rm" onclick="removePanelCourse(${i})">&times;</button>
            <h4>Course #${i+1}</h4>
            <div class="p-bilingual" style="margin-bottom:8px">
              <div class="p-half">
                <label style="font-size:9px">Name <span class="lang-badge lang-badge-zh">ZH</span></label>
                <input type="text" value="${esc(c.name_zh)}" oninput="updatePanelCourse(${i},'name_zh',this.value)" placeholder="课程名">
              </div>
              <div class="p-half">
                <label style="font-size:9px">Name <span class="lang-badge lang-badge-en">EN</span></label>
                <input type="text" value="${esc(c.name_en)}" oninput="updatePanelCourse(${i},'name_en',this.value)" placeholder="Course Name">
              </div>
            </div>
            <div class="p-bilingual">
              <div class="p-half">
                <label style="font-size:9px">Description <span class="lang-badge lang-badge-zh">ZH</span></label>
                <textarea style="min-height:44px" oninput="updatePanelCourse(${i},'description_zh',this.value)" placeholder="课程描述">${esc(c.description_zh)}</textarea>
              </div>
              <div class="p-half">
                <label style="font-size:9px">Description <span class="lang-badge lang-badge-en">EN</span></label>
                <textarea style="min-height:44px" oninput="updatePanelCourse(${i},'description_en',this.value)" placeholder="Course Description">${esc(c.description_en)}</textarea>
              </div>
            </div>
          </div>`).join('')}
      </div>
      <button class="p-add" onclick="addPanelCourse()">+ Add Course</button>
    </div>
    
    <!-- Gallery -->
    <div class="p-field">
      <label>Gallery <span class="hint">upload images with bilingual captions</span></label>
      <div class="p-gallery" id="p-gallery"></div>
    </div>
  `;
  
  renderPanelGallery();
  document.getElementById('panel-overlay').classList.add('active');
  document.getElementById('detail-panel').classList.add('active');
}

function closePanel(){
  document.getElementById('panel-overlay').classList.remove('active');
  document.getElementById('detail-panel').classList.remove('active');
  renderTable();
}

function updateField(key, val){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ f[key]=val }
  if(key==='name_zh'||key==='name_en'){
    const t = f.name_zh||f.name_en||'New Faculty';
    document.getElementById('panel-title').textContent = t;
  }
}

/* ===== Panel: Achievements ===== */
function addPanelAchievement(){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ if(!f.achievements) f.achievements=[]; f.achievements.push({name_zh:'',name_en:'',description_zh:'',description_en:''}); openPanel(currentId) }
}
function removePanelAchievement(i){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ f.achievements.splice(i,1); openPanel(currentId) }
}
function updatePanelAchievement(i,k,v){
  const f=_DATA.find(x=>x.id===currentId);
  if(f&&f.achievements[i]){ f.achievements[i][k]=v }
}

/* ===== Panel: Courses ===== */
function addPanelCourse(){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ if(!f.courses) f.courses=[]; f.courses.push({name_zh:'',name_en:'',description_zh:'',description_en:''}); openPanel(currentId) }
}
function removePanelCourse(i){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ f.courses.splice(i,1); openPanel(currentId) }
}
function updatePanelCourse(i,k,v){
  const f=_DATA.find(x=>x.id===currentId);
  if(f&&f.courses[i]){ f.courses[i][k]=v }
}

/* ===== Panel: Gallery ===== */
function renderPanelGallery(){
  const grid = document.getElementById('p-gallery'); if(!grid) return;
  const data = getData(); const f = data.find(x=>x.id===currentId); if(!f) return;
  const gallery = f.gallery || [];
  
  let html = gallery.map((g,i) => `
    <div class="p-gallery-slot">
      ${g.src?'<img src="'+esc(g.src)+'">':''}
      <div class="g-bottom">
        <div class="g-caption-row">
          <input type="text" class="cap" value="${esc(g.caption_zh||'')}" placeholder="ZH" oninput="updateGalleryCaption(${i},'caption_zh',this.value)">
          <input type="text" class="cap" value="${esc(g.caption_en||'')}" placeholder="EN" oninput="updateGalleryCaption(${i},'caption_en',this.value)">
        </div>
      </div>
      <button class="g-rm" onclick="removeGalleryItem(${i})">&times;</button>
      <input type="file" accept="image/*" onchange="replaceGalleryItem(${i},this)">
    </div>`).join('');
  
  html += '<div class="p-gallery-slot"><div class="plus">+</div><input type="file" accept="image/*" onchange="addGalleryItem(this)"></div>';
  grid.innerHTML = html;
}

async function handlePanelPhoto(input){
  const file = input.files[0]; if(!file) return;
  const url = await readFileAsDataURL(file);
  updateField('photo', url);
  document.getElementById('p-photo-wrap').innerHTML = '<img src="'+url+'"><input type="file" accept="image/*" onchange="handlePanelPhoto(this)">';
  renderTable();
}

async function addGalleryItem(input){
  const file = input.files[0]; if(!file) return;
  const url = await readFileAsDataURL(file);
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ if(!f.gallery) f.gallery=[]; f.gallery.push({src:url, caption_zh:'', caption_en:''}); renderPanelGallery(); renderTable() }
}
async function replaceGalleryItem(i, input){
  const file = input.files[0]; if(!file) return;
  const url = await readFileAsDataURL(file);
  const f=_DATA.find(x=>x.id===currentId);
  if(f&&f.gallery[i]){ f.gallery[i].src=url; renderPanelGallery(); renderTable() }
}
function removeGalleryItem(i){
  const f=_DATA.find(x=>x.id===currentId);
  if(f){ f.gallery.splice(i,1); renderPanelGallery(); renderTable() }
}
function updateGalleryCaption(i, key, v){
  const f=_DATA.find(x=>x.id===currentId);
  if(f&&f.gallery[i]){ f.gallery[i][key]=v }
}

/* ===== Utilities ===== */
function updateCount(id,v,max){ const el=document.getElementById(id); if(!el) return; el.textContent=v.length+'/'+max; el.classList.toggle('warn',v.length>max) }
function saveAndNotify(){ showToast('All changes saved'); renderTable(); closePanel() }

function exportData(){
  const json = JSON.stringify(_DATA, null, 2);
  const content = 'window.__SITE_DATA__ = ' + json + ';';
  const blob = new Blob([content], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.js'; a.click();
  URL.revokeObjectURL(url);
  showToast('data.js exported (' + _DATA.length + ' faculty)');
}

/* ===== Init ===== */
function reseedFromDataJs(){
  _DATA = JSON.parse(JSON.stringify(window.__SITE_DATA__ || []));
  renderTable();
  currentId = null;
  showToast('Reset to data.js — ' + _DATA.length + ' records');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel() });
</script>
</body>
</html>
